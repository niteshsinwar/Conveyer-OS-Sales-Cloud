<!-- videoUploader.html -->
<template>
    <lightning-card title="Video Upload" icon-name="standard:video">
        <div class="slds-p-around_medium">
            <div class="slds-grid slds-wrap">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-p-right_medium">
                     <template if:true={selectedFile}>
                    <div>File Name:{selectedFile.name}, File Size:{formattedSize}</div>
                      </template>
                    <lightning-input 
                        type="file" 
                        label="Select Video File" 
                        accept="video/*" 
                        onchange={handleFileChange}
                        disabled={isUploading}>
                    </lightning-input>
                    
                    <div class="slds-m-top_medium">
                        <lightning-button 
                            variant="brand" 
                            label="Upload Video" 
                            onclick={handleUpload} 
                            disabled={isUploading}>
                        </lightning-button>
                        
                        <lightning-button 
                            class="slds-m-left_x-small" 
                            label="View Uploaded Video" 
                            onclick={viewUploadedVideo} >
                        </lightning-button>
                    </div>
                    
                    <template if:true={isUploading}>
                        <div class="slds-m-top_medium">
                            <lightning-progress-bar 
                                value={uploadProgress} 
                                size="large">
                            </lightning-progress-bar>
                            <div class="slds-text-align_center slds-m-top_x-small">
                                Processing... {uploadProgress}%
                            </div>
                        </div>
                    </template>
                    
                    <template if:true={fileName}>
                        <div class="slds-m-top_medium">
                            <p>
                                <lightning-formatted-text 
                                    value="Last uploaded file: ">
                                </lightning-formatted-text>
                                <lightning-formatted-text 
                                    value={fileName}>
                                </lightning-formatted-text>
                            </p>
                        </div>
                    </template>
                </div>
            </div>
            
            <template if:true={showVideo}>
                <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                    <div class="slds-modal__container">
                        <header class="slds-modal__header">
                            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeVideo}>
                                <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small"></lightning-icon>
                                <span class="slds-assistive-text">Close</span>
                            </button>
                            <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Video Preview</h2>
                        </header>
                        <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                            <video width="100%" controls>
                                <source src={videoUrl} type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>
                        <footer class="slds-modal__footer">
                            <button class="slds-button slds-button_neutral" onclick={closeVideo}>Close</button>
                        </footer>
                    </div>
                </section>
                <div class="slds-backdrop slds-backdrop_open"></div>
            </template>
        </div>
    </lightning-card>
</template>
