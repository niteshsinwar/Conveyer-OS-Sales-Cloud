<template>
    <lightning-card title={chartTitle} icon-name="custom:custom63">
        <!-- Header with controls if needed -->
        <div slot="actions">
            <lightning-button-icon 
                icon-name="utility:refresh" 
                alternative-text="Refresh Chart" 
                title="Refresh Chart"
                onclick={refreshChart}>
            </lightning-button-icon>
        </div>
        
        <!-- Error display -->
        <template if:true={error}>
            <div class="slds-m-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <span class="slds-icon_container slds-icon-utility-error slds-m-right_small">
                        <lightning-icon icon-name="utility:error" size="small" variant="inverse"></lightning-icon>
                    </span>
                    <h2>An error occurred while loading chart data.</h2>
                </div>
            </div>
        </template>
        
        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-around_medium">
                <lightning-spinner alternative-text="Loading chart data" size="medium"></lightning-spinner>
            </div>
        </template>
        
        <!-- Chart container -->
        <div class="slds-m-around_medium chart-container">
            <!-- Chart canvas -->
            <template if:true={hasData}>
                <canvas lwc:dom="manual" class="chart"></canvas>
            </template>
            
            <!-- No data state -->
            <template if:false={hasData}>
                <div class="slds-illustration slds-illustration_small slds-align_absolute-center">
                    <div class="slds-text-longform slds-text-align_center">
                        <h3 class="slds-text-heading_medium slds-m-vertical_medium">
                            {noDataMessage}
                        </h3>
                        <p class="slds-text-body_regular">
                            Please check your project data or refresh the chart.
                        </p>
                    </div>
                </div>
            </template>
        </div>
        
        <!-- Footer with additional information -->
        <div slot="footer" if:true={hasData}>
            <div class="slds-grid slds-grid_align-spread slds-text-body_small slds-text-color_weak">
                <div>
                    <lightning-icon icon-name="utility:info" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                    Project data as of today
                </div>
                <div>
                    <template if:true={chartMetadata}>
                        Total Projects: {chartData.length}
                    </template>
                </div>
            </div>
        </div>
    </lightning-card>
</template>
